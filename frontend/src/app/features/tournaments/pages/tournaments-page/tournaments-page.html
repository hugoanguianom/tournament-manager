<div class="tournaments-page">
  <div class="page-header">
    <h1>Torneos</h1>
    <button class="btn btn-add" (click)="openCreateForm()">
      Crear Nuevo Torneo
    </button>
  </div>

  <section class="tournaments-section">


    <div class="tournaments-grid">
      @for (t of tournaments; track t.id) {
        <div class="tournament-card" [attr.data-status]="t.status">
          <div class="card-header">
            <div class="tournament-identity">
              <h3>{{ t.name }}</h3>
              <span class="status-badge">{{ t.status }}</span>
            </div>
          </div>



          <div class="card-actions">
            <button (click)="goToDetails(t.id)" class="btn btn-text view">
              Ver Detalles
            </button>
          </div>
        </div>
      } @empty {
        <div class="empty-state">
          <p>No hay torneos creados todavía.</p>
        </div>
      }
    </div>
  </section>

  @if (showForm) {
    <div class="form-overlay">
      <app-tournament-form
        (save)="handleSave($event)"
        (cancel)="closeForm()">
      </app-tournament-form>
    </div>
  }
</div>
