<div class="form-container">
  <h2>Nuevo Torneo</h2>

  <div class="form-group">
    <label for="tournamentName">Nombre del Torneo</label>
    <input
      type="text"
      id="tournamentName"
      [(ngModel)]="name"
      placeholder="Ej: League of legends"
      [class.input-error]="showError"
      (input)="showError = false"
    >
    @if (showError) {
      <span class="error-message">Indica el nombre del torneo</span>
    }
  </div>

  <div class="form-actions">
    <button type="button" class="btn btn-cancel" (click)="onCancel()">
      Cancelar
    </button>
    <button type="button" class="btn btn-save" (click)="onSave()">
      Crear
    </button>
  </div>
</div>
